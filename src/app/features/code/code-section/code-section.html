<section class="code-section">
  <h2 class="code-section-heading h3">
    <button
      type="button"
      class="code-section-toggle"
      [attr.aria-expanded]="expanded()"
      [attr.aria-controls]="bodyId"
      [attr.aria-label]="(expanded() ? 'Collapse ' : 'Expand ') + heading() + ' section'"
      (click)="toggle()"
    >
      <svg class="code-section-chevron" [class.is-open]="expanded()" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="9 18 15 12 9 6" />
      </svg>
      <span>{{ heading() }}</span>
    </button>
  </h2>

  @if (expanded()) {
    <div [id]="bodyId" class="code-section-body">
      <ng-content />
    </div>
  }
</section>
