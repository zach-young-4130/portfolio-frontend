<article class="snippet">
  <ng-content select="h3" />
  <ng-content select="p" />

  <button
    type="button"
    class="btn btn-sm btn-outline-secondary snippet-toggle"
    [attr.aria-expanded]="expanded()"
    [attr.aria-controls]="bodyId"
    [attr.aria-label]="(expanded() ? 'Hide code for ' : 'Show code for ') + label()"
    (click)="toggle()"
  >{{ expanded() ? openLabel : closedLabel }}</button>

  @if (expanded()) {
    <div [id]="bodyId">
      <ng-content select="pre" />
    </div>
  }
</article>
