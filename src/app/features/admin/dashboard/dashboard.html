<section class="container py-5" aria-labelledby="admin-heading">
  <h1 id="admin-heading" class="h2 mb-4">Admin</h1>

  <div class="row g-4">
    <div class="col-md-6 col-lg-3">
      <a routerLink="/admin/projects" class="dashboard-tile d-block p-4 text-decoration-none">
        <h2 class="h5">Projects</h2>
        <p class="small text-muted mb-0">Manage portfolio entries</p>
      </a>
    </div>
    <div class="col-md-6 col-lg-3">
      <a routerLink="/admin/faq" class="dashboard-tile d-block p-4 text-decoration-none">
        <h2 class="h5">FAQ</h2>
        <p class="small text-muted mb-0">Manage questions</p>
      </a>
    </div>
    <div class="col-md-6 col-lg-3">
      <a routerLink="/admin/community" class="dashboard-tile d-block p-4 text-decoration-none">
        <h2 class="h5">Community</h2>
        <p class="small text-muted mb-0">Manage involvements</p>
      </a>
    </div>
    <div class="col-md-6 col-lg-3">
      <a routerLink="/admin/messages" class="dashboard-tile d-block p-4 text-decoration-none">
        <h2 class="h5 d-flex align-items-center justify-content-between">
          Messages
          @if (unreadCount() > 0) {
            <span class="badge bg-primary" [attr.aria-label]="unreadCount() + ' unread messages'">
              {{ unreadCount() }}
            </span>
          }
        </h2>
        <p class="small text-muted mb-0">Contact inbox</p>
      </a>
    </div>
  </div>
</section>
