<section class="container py-5" aria-labelledby="admin-heading">
  <h1 id="admin-heading" class="h2 mb-4">Admin</h1>

  <div class="row g-4">
    <div class="col-md-6 col-lg-3">
      <a routerLink="/admin/projects" class="dashboard-tile d-flex align-items-center p-4 text-decoration-none">
        <div class="flex-grow-1 me-3">
          <h2 class="h5 mb-1">Projects</h2>
          <p class="small text-muted mb-0">Manage portfolio entries</p>
        </div>
        <div class="dashboard-tile__count">
          {{ projectsCount() ?? '—' }}<span class="visually-hidden"> projects</span>
        </div>
      </a>
    </div>
    <div class="col-md-6 col-lg-3">
      <a routerLink="/admin/faq" class="dashboard-tile d-flex align-items-center p-4 text-decoration-none">
        <div class="flex-grow-1 me-3">
          <h2 class="h5 mb-1">FAQ</h2>
          <p class="small text-muted mb-0">Manage questions</p>
        </div>
        <div class="dashboard-tile__count">
          {{ faqCount() ?? '—' }}<span class="visually-hidden"> questions</span>
        </div>
      </a>
    </div>
    <div class="col-md-6 col-lg-3">
      <a routerLink="/admin/community" class="dashboard-tile d-flex align-items-center p-4 text-decoration-none">
        <div class="flex-grow-1 me-3">
          <h2 class="h5 mb-1">Community</h2>
          <p class="small text-muted mb-0">Manage involvements</p>
        </div>
        <div class="dashboard-tile__count">
          {{ communityCount() ?? '—' }}<span class="visually-hidden"> involvements</span>
        </div>
      </a>
    </div>
    <div class="col-md-6 col-lg-3">
      <a routerLink="/admin/messages" class="dashboard-tile d-flex align-items-center p-4 text-decoration-none">
        <div class="flex-grow-1 me-3">
          <h2 class="h5 mb-1">Messages</h2>
          <p class="small text-muted mb-0">Contact inbox</p>
        </div>
        <div class="dashboard-tile__count">
          {{ unreadCount() ?? '—' }}<span class="visually-hidden"> unread messages</span>
        </div>
      </a>
    </div>
  </div>
</section>
