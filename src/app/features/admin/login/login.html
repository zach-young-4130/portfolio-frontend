<section class="container py-5" aria-labelledby="login-heading">
  <div class="mx-auto" style="max-width: 400px;">
    <h1 id="login-heading" class="h2 mb-4 text-center">Sign In</h1>

    @if (errorMessage(); as msg) {
      <div role="alert" class="alert alert-danger">{{ msg }}</div>
    }

    <div #googleButton class="d-flex justify-content-center mb-3"></div>

    <div class="d-flex align-items-center my-3" aria-hidden="true">
      <hr class="flex-grow-1" />
      <span class="px-2 small text-muted">or</span>
      <hr class="flex-grow-1" />
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="mb-3">
        <label for="login-email" class="form-label">Email</label>
        <input
          id="login-email"
          type="email"
          class="form-control"
          formControlName="email"
          autocomplete="username"
          placeholder="you@example.com"
        />
      </div>
      <div class="mb-3">
        <label for="login-password" class="form-label">Password</label>
        <input
          id="login-password"
          type="password"
          class="form-control"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Your password"
        />
      </div>
      <button
        type="submit"
        class="btn btn-primary w-100"
        [disabled]="submitting()"
        [attr.aria-disabled]="form.invalid || submitting() ? 'true' : null"
      >
        @if (submitting()) { Signing in&hellip; } @else { Sign in }
      </button>
    </form>
  </div>
</section>
