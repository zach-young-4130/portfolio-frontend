<app-page-hero title="Projects" subtitle="Things I've built." image="projects-hero.jpg" />

<section class="container py-5">

  <div class="search-bar mb-5">
    <label for="project-search" class="visually-hidden">Search projects</label>
    <div class="search-input-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="project-search"
        type="search"
        class="form-control search-input"
        placeholder="Search by title, tech stack, or description…"
        [ngModel]="query()"
        (ngModelChange)="query.set($event)"
        autocomplete="off"
      />
      @if (query()) {
        <button
          type="button"
          class="search-clear"
          aria-label="Clear search"
          (click)="clearSearch()"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      }
    </div>
  </div>

  @if (loading()) {
    <p role="status" class="text-center">Loading projects&hellip;</p>
  } @else if (projects().length === 0 && query()) {
    <p class="text-center text-muted">No projects matched &ldquo;{{ query() }}&rdquo;.</p>
  } @else if (projects().length === 0) {
    <p class="text-center text-muted">No projects yet.</p>
  } @else {
    <div class="row g-4">
      @for (project of projects(); track project.id) {
        <div class="col-md-6 col-lg-4">
          <app-project-card [project]="project" />
        </div>
      }
    </div>
  }

</section>
